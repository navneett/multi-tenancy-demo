<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contract analyst agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f3ef; color: #2c2c2a; }
    header { display: flex; justify-content: space-between; align-items: center;
              padding: 1rem 1.5rem; background: #fff; border-bottom: 1px solid #e5e3da; }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    .connect-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .connect-btn { padding: 0.5rem 1rem; border: 1px solid #d3d1c7; border-radius: 8px;
                   background: #fff; cursor: pointer; font-size: 13px; }
    #messages { display: flex; flex-direction: column; gap: 0.75rem; min-height: 300px; margin-bottom: 1rem; }
    .msg { padding: 0.75rem 1rem; border-radius: 10px; max-width: 80%; line-height: 1.5; }
    .msg.user { background: #0c447c; color: #fff; align-self: flex-end; }
    .msg.agent { background: #fff; border: 1px solid #e5e3da; align-self: flex-start; }
    form { display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.75rem; border: 1px solid #d3d1c7; border-radius: 8px; font-size: 15px; }
    button[type=submit] { padding: 0.75rem 1.25rem; background: #1a1a1a; color: #fff; border: none;
                           border-radius: 8px; cursor: pointer; }
    a.logout { font-size: 13px; color: #5f5e5a; }
  </style>
</head>
<body>
  <header>
    <strong>Contract analyst agent</strong>
    <div>
      <span style="font-size: 13px; color: #5f5e5a; margin-right: 1rem;">{{ user_email }}</span>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </header>

  <div class="container">
    <div class="connect-row">
      <button class="connect-btn" id="connect-drive">Connect Google Drive</button>
    </div>

    <div id="messages"></div>

    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Ask about a contract..." autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    let sessionId = null;

    function appendMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("message-input");
      const message = input.value.trim();
      if (!message) return;
      appendMessage("user", message);
      input.value = "";

      const resp = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, session_id: sessionId }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          const event = JSON.parse(line);
          if (event.session_id) sessionId = event.session_id;
          if (event.content) appendMessage("agent", event.content);
        }
      }
    });

    // The Drive "connect" button triggers the agent's 3LO flow by sending a
    // message that requires the Drive tool - ADK/Agent Identity intercepts
    // this and returns an auth_request event instead of a normal reply.
    // Listen for the postMessage from the OAuth popup (see oauth_router.py)
    // to know when to retry.
    window.addEventListener("message", (e) => {
      if (e.data === "oauth-complete") {
        appendMessage("agent", "Access granted - you can now ask about that source.");
      }
    });

    document.getElementById("connect-drive").addEventListener("click", () => {
      window.open("about:blank", "oauth-popup", "width=480,height=640");
      // In a real build: send a message that triggers the Drive tool,
      // catch the resulting auth_request event, and navigate the popup to
      // the authorization URL it contains.
    });
  </script>
</body>
</html>
